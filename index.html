<!DOCTYPE html>
<html>
<head>
  <title>Smart Menu</title>
  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 50px;
      color: gold;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 15px;
      width: 200px;
      border: none;
      border-radius: 10px;
      background: gold;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🍽 Smart Menu</h1>

<button onclick="openAR('egg')">Egg Fried</button>
<button onclick="openAR('burger')">Burger</button>
<button onclick="openAR('pizza')">Pizza</button>

<script src="app.js"></script>

</body>
</html>
