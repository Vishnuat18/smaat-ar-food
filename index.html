<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>4D Smart Food AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Cinematic Intro Overlay -->
  <div id="intro-overlay">
    <div class="content">
      <h1 class="glow-text">BIRYANI</h1>
      <p class="subtitle">4D Smart Food Experience</p>
      <div class="loader-container">
        <div class="loader-ring"></div>
        <div id="loading-progress">0%</div>
      </div>
      <button id="start-ar-btn" class="premium-btn" disabled>LOADING DISH...</button>
      <p class="hint">Point camera at a flat surface</p>
    </div>
  </div>

  <!-- Real-time HUD -->
  <div id="ar-hud" class="hidden">
    <div class="top-info">
      <div class="badge">LIVE AR</div>
      <div id="status-msg">Scanning surface...</div>
    </div>

    <!-- Bottom Glassmorphism Panel -->
    <div class="bottom-panel">
      <div class="panel-header">
        <h2 id="dish-name">Classic Biryani</h2>
        <div class="health-score">
          <span>Health Score</span>
          <div class="score-circle">8.5</div>
        </div>
      </div>
      
      <div class="stats-grid">
        <div class="stat-item">
          <span class="label">Calories</span>
          <span class="value">450 kcal</span>
        </div>
        <div class="stat-item">
          <span class="label">Proteins</span>
          <span class="value">22g</span>
        </div>
        <div class="stat-item">
          <span class="label">Carbs</span>
          <span class="value">58g</span>
        </div>
      </div>
    </div>
  </div>

  <div id="container"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
